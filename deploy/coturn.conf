# Optional self-hosted TURN (coturn) — only if you'd rather not use a managed
# provider like Metered. Install: sudo apt install coturn, then put this at
# /etc/turnserver.conf, set TURNSERVER_ENABLED=1 in /etc/default/coturn, and
# `sudo systemctl enable --now coturn`.
#
# Point server/.env at it:
#   TURN_SERVER_URL=turn:beacon.example.com:3478
#   TURN_SERVER_USERNAME=beacon
#   TURN_SERVER_PASSWORD=<the password below>
#
# Open these ports in the Hetzner firewall: 3478 tcp+udp, 5349 tcp+udp,
# and the UDP relay range 49152-65535.

listening-port=3478
tls-listening-port=5349

# Long-term credentials (one fixed user). Change the password.
lt-cred-mech
user=beacon:change-me-to-a-strong-password
realm=beacon.example.com

# Replace with the server's public IPv4.
external-ip=YOUR_SERVER_IPV4

min-port=49152
max-port=65535

# Lock down: relay only, no loopback/multicast abuse.
no-multicast-peers
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255

# For TLS (turns:) reuse the Caddy-issued cert, e.g.:
# cert=/var/lib/caddy/.local/share/caddy/certificates/.../beacon.example.com.crt
# pkey=/var/lib/caddy/.local/share/caddy/certificates/.../beacon.example.com.key
